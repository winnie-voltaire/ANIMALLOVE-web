<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animal Love - Cadastro de Pet</title>
  <!-- Fonte -->
   <link rel="icon" type="image/png" href="img/logoaa.png">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/output.css">
  <style>
    body{ font-family: 'Poppins', sans-serif; 
    }
    .title-font{ font-family: 'Anton', sans-serif; 
    }
  </style>
</head>
<body class="min-h-screen paw-bg flex flex-col relative bg-gray-50">

  <!-- TELA DE SUCESSO (MODAL FLUTUANTE) -->
  <div id="cadastro-sucesso" class="meu-modal fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl relative">
      <!-- Botão X: Limpa e volta para a página inicial -->
      <a href="adotar.html" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl font-bold no-underline">✕</a>
      
    <!-- BOLINHA VERDE COM O ÍCONE DE CHECK -->
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner animate-bounce">
                <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" xmlns="http://w3.org">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
      <h3 class="title-font text-2xl text-emerald-700 uppercase tracking-wider mb-2">Pet Cadastrado!</h3>
      <p class="text-gray-500 text-sm mb-4">O perfil do animal foi postado com sucesso no sistema para adoção.</p>
      
      <!-- Botão OK: Redireciona para a página principal -->
      <a href="adotar.html" class="inline-block bg-emerald-700 hover:bg-emerald-600 text-white 
      font-semibold py-2 px-6 rounded-lg text-sm transition-colors no-underline">
        OK
      </a>
    </div>
  </div>

  <!-- HEADER ALTERADO PARA BRANCO COM BORDA E SOMBRA -->
        <header class="fixed top-0 left-0 bg-slate-100 border-b border-gray-100 
        w-full z-50 shadow-sm">
            <!-- Container interno para afastar o menu das bordas da tela -->
            <div class="max-w-6xl mx-auto flex items-center justify-between px-6 
            md:px-12 py-4">
      
      <!-- Lado Esquerdo: Logo -->
      <div>
        <a href="index.html">
          <img src="img/logo.png" class="w-20 md:w-[225px]" alt="Logo">
        </a>
      </div>

    </div>
  </header>

  <!-- Container Principal Centrado -->
  <main class="flex-grow flex items-center justify-center min-h-screen px-4 pt-36 pb-10">
    <!-- Caixa BRANCA com Letras Grandes (Acessibilidade para Miopia) -->
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-2xl border border-gray-100">
      <h2 class="title-font text-4xl text-emerald-600 text-center mb-2 uppercase tracking-wider">
        Cadastrar Pet
      </h2>
      <p class="text-center text-gray-500 text-base mb-8">Insira os dados e as fotos do animal para publicação</p>
      
      <!-- Formulário limpo que aciona o modal de sucesso -->
      <form action="#cadastro-sucesso" method="GET" enctype="multipart/form-data" class="space-y-6">
        
        <!-- Campo: Nome do Animal -->
        <div>
          <label class="block text-gray-800 text-lg font-bold mb-2 uppercase tracking-wide">Nome do Animal:</label>
          <input type="text" placeholder="Ex: Thor, Mel, Bob..." class="w-full px-5 py-3.5 border-2 border-gray-300 
          rounded-xl text-lg font-medium text-gray-800 focus:outline-none focus:ring-4 focus:ring-emerald-400/30 focus:border-emerald-400" required>
        </div>

        <!-- Grid de Informações Técnicas -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-800 text-lg font-bold mb-2 uppercase tracking-wide">Idade:</label>
            <input type="text" placeholder="Ex: 3 anos" class="w-full px-5 py-3.5 border-2 border-gray-300 rounded-xl
             text-lg font-medium text-gray-800 focus:outline-none focus:ring-4 focus:ring-emerald-400/30 focus:border-emerald-400" required>
          </div>
          <div>
            <label class="block text-gray-800 text-lg font-bold mb-2 uppercase tracking-wide">Porte:</label>
            <input type="text" placeholder="Pequeno, Médio ou Grande" class="w-full px-5 py-3.5 border-2 border-gray-300 rounded-xl
             text-lg font-medium text-gray-800 focus:outline-none focus:ring-4 focus:ring-emerald-400/30 focus:border-emerald-400" required>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-800 text-lg font-bold mb-2 uppercase tracking-wide">Sexo:</label>
            <input type="text" placeholder="Macho ou Fêmea" class="w-full px-5 py-3.5 border-2 border-gray-300
             rounded-xl text-lg font-medium text-gray-800 focus:outline-none focus:ring-4 focus:ring-emerald-400/30 focus:border-emerald-400" required>
          </div>
          <div>
            <label class="block text-gray-800 text-lg font-bold mb-2 uppercase tracking-wide">Vacinado:</label>
            <input type="text" placeholder="Sim ou Não" class="w-full px-5 py-3.5 border-2 border-gray-300 rounded-xl
             text-lg font-medium text-gray-800 focus:outline-none focus:ring-4 focus:ring-emerald-400/30 focus:border-emerald-400" required>
          </div>
        </div>

        <!-- Campo: Sobre o Pet -->
        <div>
          <label class="block text-gray-800 text-lg font-bold mb-2 uppercase tracking-wide">Sobre o Pet (História / Detalhes):</label>
          <textarea rows="4" placeholder="Conte sobre o temperamento dele, do que ele gosta, comportamento com outros animais..." class="w-full px-5 py-3.5 
          border-2 border-gray-300 rounded-xl text-lg font-medium text-gray-800 focus:outline-none focus:ring-4 focus:ring-emerald-400/30 focus:border-emerald-400
           resize-none" required></textarea>
        </div>

        <!-- Campo de Fotos: Estrutura de 3 Quadrados Lado a Lado -->
        <div>
          <label class="block text-gray-800 text-lg font-bold mb-2 uppercase tracking-wide">Fotos do Pet (Clique para adicionar):</label>
          <div class="grid grid-cols-3 gap-3">
            
            <!-- Quadrado 1 (OBRIGATÓRIO) -->
            <label class="relative flex flex-col items-center justify-center h-28 border-2 border-dashed 
            border-emerald-300 rounded-xl bg-emerald-50/50 hover:bg-emerald-50 cursor-pointer overflow-hidden">
              <input type="file" name="foto1" accept="image/*" required class="absolute inset-0 opacity-0 cursor-pointer z-20"
               onchange="this.nextElementSibling.src=window.URL.createObjectURL(this.files[0]); this.nextElementSibling.classList.remove('hidden');">
              <img class="absolute inset-0 w-full h-full object-cover hidden" alt="Prévia">
              <span class="text-2xl text-purple-600 font-bold">📎</span>
              <span class="text-[10px] text-emerald-700 font-bold mt-1">Foto 1 🐾</span>
            </label>

            <!-- Quadrado 2 (OPCIONAL) -->
            <label class="relative flex flex-col items-center justify-center h-28 border-2 border-dashed border-gray-200 rounded-xl bg-gray-50 hover:bg-gray-100 cursor-pointer overflow-hidden">
              <input type="file" name="foto2" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20"
               onchange="this.nextElementSibling.src=window.URL.createObjectURL(this.files[0]); this.nextElementSibling.classList.remove('hidden');">
              <img class="absolute inset-0 w-full h-full object-cover hidden" alt="Prévia">
              <span class="text-2xl text-gray-400 font-bold">📎</span>
              <span class="text-[10px] text-gray-500 font-medium mt-1">Foto 2</span>
            </label>

            <!-- Quadrado 3 (OPCIONAL) -->
            <label class="relative flex flex-col items-center justify-center h-28 border-2 border-dashed border-gray-200 rounded-xl bg-gray-50 hover:bg-gray-100 cursor-pointer overflow-hidden">
              <input type="file" name="foto3" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20"
               onchange="this.nextElementSibling.src=window.URL.createObjectURL(this.files[0]); this.nextElementSibling.classList.remove('hidden');">
              <img class="absolute inset-0 w-full h-full object-cover hidden" alt="Prévia">
              <span class="text-2xl text-gray-400 font-bold">📎</span>
              <span class="text-[10px] text-gray-500 font-medium mt-1">Foto 3</span>
            </label>
          </div>
        </div>

        <!-- Botões de Ação Inferiores -->
        <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t-2 border-gray-100">
          <!-- Botão Cancelar -->
          <a href="alerta_cadastropet.html" class="w-full sm:w-1/3 px-6 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-sm rounded-xl text-center 
          transition-colors no-underline uppercase tracking-wider"> Cancelar </a>
          <!-- Botão Enviar Cadastro -->
          <button type="submit" class="w-full sm:w-2/3 bg-emerald-700 hover:bg-emerald-600 text-white font-extrabold
           text-base py-4 px-6 rounded-xl text-center transition-all shadow-md hover:shadow-lg uppercase tracking-wider cursor-pointer"> Cadastrar Animal </button>
        </div>

      </form>

      </div>
    </main>
  </div>
</body>
</html>
