<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animal Love - Denúncia</title>
  <!-- Fonte -->
  <link rel="icon" type="image/png" href="img/logoaa.png">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/output.css">
  <style>
    body{ font-family: 'Poppins', sans-serif; 
    }
    .title-font{ font-family: 'Anton', sans-serif; 
    }
/* SOLUÇÃO DEFINITIVA PARA MATAR O ZOOM DA IMAGEM */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('img/fundo.jpg');
            background-repeat: repeat;
            background-size: auto; /* Trava no tamanho real da foto, sem esticar */
        }
  </style>
</head>
<body class="min-h-screen paw-bg flex flex-col relative bg-gray-50">

  <!-- TELA DE SUCESSO (MODAL) -->
  <div id="denuncia-realizada" class="meu-modal fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl relative">
      <a href="index.html" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl font-bold no-underline">✕</a>
      
      <!-- BOLINHA VERDE COM O ÍCONE DE CHECK -->
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner animate-bounce">
                <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" xmlns="http://w3.org">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
      
      <h3 class="title-font text-xl text-red-700 uppercase tracking-wider mb-2">Denúncia Realizada!</h3>
      <p class="text-gray-500 text-xs mb-4">Seus dados e as fotos foram enviados com sucesso.</p>
      
      <a href="index.html" class="inline-block bg-red-700 hover:bg-red-600 text-white font-semibold py-2 px-6 
      rounded-lg text-sm transition-colors no-underline">
        OK
      </a>
    </div>
  </div>

  <div class="w-full">
    <div class="bg-[url(/img/fundo.jpg)]"></div>
    
  <!-- HEADER ALTERADO PARA BRANCO COM BORDA E SOMBRA -->
        <header class="fixed top-0 left-0 bg-slate-100 border-b border-gray-100 
        w-full z-50 shadow-sm">
            <!-- Container interno para afastar o menu das bordas da tela -->
            <div class="max-w-6xl mx-auto flex items-center justify-between px-6 
            md:px-12 py-4">
        <div class="container flex items-center mx-auto">
          <div>
            <a href="#">
              <img src="img/logo.png" class="w-20 md:w-[225px]" alt="Logo">
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Container Principal -->
    <main class="flex-grow flex items-center justify-center min-h-screen px-4 pt-32 pb-10">
      
      <!-- Caixa BRANCA do Formulário -->
      <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg border border-gray-100">
        
        <h2 class="title-font text-3xl text-red-700 text-center mb-6 uppercase tracking-wider">
          Formulário de<br>Denúncia
        </h2>
        
        <form action="#denuncia-realizada" method="GET" enctype="multipart/form-data" class="space-y-4">
          
          <!-- Campo: Nome -->
          <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Nome:</label>
            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-800 focus:outline-none 
            focus:ring-2 focus:ring-red-400 focus:border-transparent" required>
          </div>
          
          <!-- Campo: Telefone -->
          <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Telefone:</label>
            <input type="tel" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-800 focus:outline-none focus:ring-2
             focus:ring-red-400 focus:border-transparent">
          </div>

          <!-- Campo: CPF -->
          <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Endereço:</label>
            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-800 focus:outline-none focus:ring-2 
            focus:ring-red-400 focus:border-transparent">
          </div>

          <!-- MÓDULO DE FOTOS 100% HTML PURO (1 Obrigatória e 2 Opcionais) -->
          <div>
            <label class="block text-gray-700 text-sm font-medium mb-2">Fotos da Denúncia (Clique nos quadrados para adicionar):</label>
            
            <div class="grid grid-cols-3 gap-3">
              
              <!-- Quadrado 1 (OBRIGATÓRIO) -->
              <label class="relative flex flex-col items-center justify-center h-28 border-2 border-dashed border-red-300 
              rounded-xl bg-red-50/50 hover:bg-red-50 cursor-pointer overflow-hidden group">
                <input type="file" name="foto1" accept="image/*" required class="absolute inset-0 opacity-0 cursor-pointer z-20"
                 onchange="this.nextElementSibling.src=window.URL.createObjectURL(this.files[0]);
                  this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.nextElementSibling.classList.add('hidden');">
                <img class="absolute inset-0 w-full h-full object-cover hidden z-10 pointer-events-none">
                <div class="text-center p-1 z-0">
                  <span class="text-red-700 text-lg font-bold block">📎</span>
                  <span class="text-[10px] font-semibold text-red-700">Foto 1 🐾</span>
                  <span class="text-[8px] text-gray-400 block">(Obrigatória)</span>
                </div>
              </label>

              <!-- Quadrado 2 (OPCIONAL) -->
              <label class="relative flex flex-col items-center justify-center h-28 border-2 border-dashed border-gray-200 
              rounded-xl bg-gray-50 hover:bg-gray-100 cursor-pointer overflow-hidden group">
                <input type="file" name="foto2" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20" 
                onchange="this.nextElementSibling.src=window.URL.createObjectURL(this.files[0]); this.nextElementSibling.classList.remove('hidden');
                 this.nextElementSibling.nextElementSibling.classList.add('hidden');">
                <img class="absolute inset-0 w-full h-full object-cover hidden z-10 pointer-events-none">
                <div class="text-center p-1 z-0">
                  <span class="text-gray-400 text-lg block">📎</span>
                  <span class="text-[10px] font-medium text-gray-500">Foto 2</span>
                  <span class="text-[8px] text-gray-400 block">(Opcional)</span>
                </div>
              </label>

              <!-- Quadrado 3 (OPCIONAL) -->
              <label class="relative flex flex-col items-center justify-center h-28 border-2 border-dashed border-gray-200 rounded-xl bg-gray-50 hover:bg-gray-100 cursor-pointer overflow-hidden group">
                <input type="file" name="foto3" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20" 
                onchange="this.nextElementSibling.src=window.URL.createObjectURL(this.files[0]); this.nextElementSibling.classList.remove('hidden');
                 this.nextElementSibling.nextElementSibling.classList.add('hidden');">
                <img class="absolute inset-0 w-full h-full object-cover hidden z-10 pointer-events-none">
                <div class="text-center p-1 z-0">
                  <span class="text-gray-400 text-lg block">📎</span>
                  <span class="text-[10px] font-medium text-gray-500">Foto 3</span>
                  <span class="text-[8px] text-gray-400 block">(Opcional)</span>
                </div>
              </label>

            </div>
          </div>

          <!-- Campo: Informação -->
          <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Informação para a denúncia:</label>
            <textarea rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-800 focus:outline-none focus:ring-2
             focus:ring-red-400 focus:border-transparent resize-none" placeholder="Escreva aqui os detalhes..." required></textarea>
          </div>

          <!-- Botão de Enviar Roxo Padrão -->
          <button type="submit" class="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition-colors
           mt-2 block text-center cursor-pointer">
            Enviar Denúncia
          </button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
