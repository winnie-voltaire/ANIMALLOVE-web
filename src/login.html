<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Animal Love - Login</title>
    <!-- Fonte -->
    <link rel="icon" type="image/png" href="img/logoaa.png">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/output.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .title-font {
            font-family: 'Anton', sans-serif;
        } 
    </style>
</head>
<body class="min-h-screen paw-bg flex flex-col relative">

    <!-- TELA DE SUCESSO DE LOGIN (MODAL) -->
    <div id="login-realizado" class="meu-modal fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl relative">
            <!-- BOTÃO X PARA FECHAR: Remove o # da URL e fecha o modal -->
            <a href="#" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl font-bold no-underline">✕</a>
            
            <!-- BOLINHA VERDE COM O ÍCONE DE CHECK -->
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner animate-bounce">
                <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" xmlns="http://w3.org">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="title-font text-2xl text-yellow-600 uppercase tracking-wider mb-2">Login Confirmado!</h3>
            <p class="text-gray-600 text-sm mb-4">Seja bem-vindo de volta à nossa comunidade.</p>
            
            <!-- BOTÃO OK: Limpa a URL e mantém o usuário na página principal -->
            <a href="index.html" class="inline-block bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded-lg transition-colors no-underline">
                OK
            </a>
        </div>
    </div>

    <div class="w-full">
        <div class="bg-[url(/img/fundo.jpg)]"></div>
        
        <!-- HEADER ALTERADO PARA BRANCO COM BORDA E SOMBRA -->
        <header class="fixed top-0 left-0 bg-slate-100 border-b border-gray-100 
        w-full z-50 shadow-sm">
            <!-- Container interno para afastar o menu das bordas da tela -->
            <div class="max-w-6xl mx-auto flex items-center justify-between px-6 
            md:px-12 py-4">
                <div class="container flex items-center mx-auto">
                    <div>
                        <a href="index.html">
                            <img src="img/logo.png" class="w-20 md:w-[225px]" alt="Logo">
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Container Principal -->
        <main class="flex-grow flex items-center justify-center min-h-screen px-4 pt-32 pb-10">
            
            <!-- Caixa Branca do Formulário de Login -->
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
                <h2 class="title-font text-3xl text-yellow-600 text-center mb-6 uppercase tracking-wider">
                    Área do<br>Voluntário
                </h2>

                <form action="#login-realizado" method="GET" class="space-y-4">
                    
                    <!-- Campo de Email -->
                    <div>
                        <label class="block text-gray-700 text-sm font-medium mb-1">E-mail:</label>
                        <input type="email" placeholder="seu@email.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent" required>
                    </div>

                    <!-- Campo de Senha -->
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-gray-700 text-sm font-medium">Senha:</label>
                            <a href="#" class="text-xs text-blue-500 hover:underline">Esqueceu a senha?</a>
                        </div>
                        <input type="password" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent" required>
                    </div>

                    <!-- Lembre-me -->
                    <div class="flex items-center">
                        <input type="checkbox" id="lembrar" name="lembrar" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-400 cursor-pointer">
                        <label for="lembrar" class="ml-2 text-sm text-gray-600 cursor-pointer">Lembrar de mim</label>
                    </div>

                    <!-- Botão de Entrar -->
                    <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2.5 px-4 rounded-lg transition-colors mt-4 block text-center cursor-pointer">
                        Entrar
                    </button>
                    
                    <!-- Link de Redirecionamento com Cores Customizadas no Mouse -->
                    <div class="text-center mt-4">
                        <p class="text-sm text-gray-600">
                            Ainda não é cadastrado? 
                            <a href="voluntario.html" class="text-blue-600 font-semibold hover:text-blue-800 transition-colors underline">Cadastre-se aqui</a>
                        </p>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
